<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Concept A: Minimal rocket silhouette — conveys "launch" directly -->
  <defs>
    <linearGradient id="bg-a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="128" height="128" rx="28" fill="url(#bg-a)"/>
  <!-- Rocket body — bold geometric shape -->
  <path d="M64 22 C64 22, 44 52, 44 78 C44 90, 52 96, 64 96 C76 96, 84 90, 84 78 C84 52, 64 22, 64 22Z" fill="white"/>
  <!-- Rocket window -->
  <circle cx="64" cy="64" r="8" fill="#6366f1"/>
  <!-- Flame -->
  <path d="M54 96 L64 114 L74 96" fill="#fbbf24" opacity="0.95"/>
  <path d="M58 96 L64 108 L70 96" fill="#f97316" opacity="0.9"/>
  <!-- Fins -->
  <path d="M44 78 L32 92 L44 88Z" fill="rgba(255,255,255,0.8)"/>
  <path d="M84 78 L96 92 L84 88Z" fill="rgba(255,255,255,0.8)"/>
</svg>
