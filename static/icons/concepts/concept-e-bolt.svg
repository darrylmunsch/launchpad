<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Concept E: Lightning bolt — "fast" and "instant", very readable at 16px -->
  <defs>
    <linearGradient id="bg-e" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="128" height="128" rx="28" fill="url(#bg-e)"/>
  <!-- Bold lightning bolt — high contrast, reads well small -->
  <path d="M72 16 L40 72 L58 72 L52 112 L92 52 L72 52 Z" fill="white"/>
</svg>
