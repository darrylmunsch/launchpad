<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Concept D: Terminal prompt with spark — developer-focused, "command center" feel -->
  <defs>
    <linearGradient id="bg-d" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#313244"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background — dark like a terminal -->
  <rect width="128" height="128" rx="28" fill="url(#bg-d)"/>
  <!-- Prompt chevron > -->
  <path d="M30 48 L56 64 L30 80" fill="none" stroke="#a78bfa" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cursor line -->
  <rect x="66" y="56" width="32" height="16" rx="3" fill="#fbbf24" opacity="0.9"/>
  <!-- Spark/star accent — top right -->
  <circle cx="98" cy="30" r="3" fill="#f472b6"/>
  <circle cx="106" cy="24" r="2" fill="#f472b6" opacity="0.6"/>
  <circle cx="92" cy="22" r="2" fill="#f472b6" opacity="0.4"/>
</svg>
