<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>

  <!-- Theme script: runs before CSS loads to prevent flash -->
  <script src="theme-init.js"></script>

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/bookmarks.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/context-menu.css">
  <link rel="stylesheet" href="css/toast.css">
  <link rel="stylesheet" href="css/tools-panel.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1 class="sidebar-logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C12 2 8.5 7 8.5 13a3.5 3.5 0 0 0 7 0C15.5 7 12 2 12 2z"/>
          <circle cx="12" cy="12.5" r="1.5" fill="currentColor" stroke="none"/>
          <path d="M8.5 13L6 16.5" /><path d="M15.5 13L18 16.5"/>
          <path d="M10 16.5L12 20L14 16.5"/>
        </svg>
        <span>Bookmarks</span>
      </h1>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button class="sidebar-btn" id="sidebar-collapse-btn" title="Collapse sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <button class="sidebar-btn" id="tools-btn" title="Tools (Ctrl+/)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
        </svg>
      </button>
      <button class="sidebar-btn" id="settings-btn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </aside>

  <main class="main-content" id="main-content">
    <header class="content-header" id="content-header"></header>
    <section class="bookmark-grid" id="bookmark-grid"></section>
  </main>

  <!-- Edit Bookmark Dialog -->
  <dialog class="modal" id="edit-modal">
    <form method="dialog" class="modal-form" id="edit-form">
      <h2 class="modal-title">Edit Bookmark</h2>
      <label class="form-field">
        <span class="form-label">Title</span>
        <input type="text" class="form-input" id="edit-title" required>
      </label>
      <label class="form-field">
        <span class="form-label">URL</span>
        <input type="url" class="form-input" id="edit-url" required>
      </label>
      <label class="form-field">
        <span class="form-label">Folder</span>
        <select class="form-select" id="edit-folder"></select>
      </label>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="edit-cancel">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </dialog>

  <!-- Settings Dialog -->
  <dialog class="modal modal-lg" id="settings-modal">
    <div class="settings-layout">
      <nav class="settings-nav">
        <button class="settings-tab active" data-tab="general">General</button>
        <button class="settings-tab" data-tab="appearance">Appearance</button>
        <button class="settings-tab" data-tab="about">About</button>
      </nav>
      <div class="settings-content" id="settings-content"></div>
      <button class="modal-close" id="settings-close" title="Close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </dialog>

  <!-- Context Menu -->
  <div class="context-menu" id="context-menu" hidden></div>

  <script src="app.js" defer></script>
</body>
</html>
